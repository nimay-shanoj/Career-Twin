<!DOCTYPE html>
<html>
<head>
    <title>Career Twin Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Career Twin</h1>

        <h2>Welcome Back</h2>

        <p>Register to continue your career journey</p>

        <form action="/register" method="POST">
            {% if error %}
            <div style="color: #ff6b6b; margin-bottom: 15px; font-size: 14px; font-weight: bold; text-align: center;">{{ error }}</div>
            {% endif %}

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>
            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>
                   

            <button type="submit">
                Register
            </button>

        </form>

        <div class="register-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
