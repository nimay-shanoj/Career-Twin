<!DOCTYPE html>
<html>
<head>
    <title>Career Twin Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Career Twin</h1>

        <h2>Welcome Back</h2>

        <p>Continue your career journey</p>

        <form action="/login" method="POST">
            {% if error %}
            <div style="color: #ff6b6b; margin-bottom: 15px; font-size: 14px; font-weight: bold; text-align: center;">{{ error }}</div>
            {% endif %}

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>
            

        </form>

        <div class="register-link">

            Don't have an account?

            <a href="register.html">
                Register
            </a>

        </div>

    </div>

</div>

</body>
</html>
